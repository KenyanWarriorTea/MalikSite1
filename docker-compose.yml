version: '3.8'

services:
  web:
    build:
      context: ./backend
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/tasks_db
      JUDGE0_URL: http://judge0:2358
    volumes:
      - ./backend:/app
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
      judge0-db:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tasks_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  judge0-db:
    image: redis:7-alpine
    networks:
      - app-network
    restart: unless-stopped

  judge0:
    image: judge0/judge0:latest
    ports:
      - '2358:2358'
    networks:
      - app-network
    environment:
      REDIS_URL: redis://judge0-db:6379
      API_BASE_URL: http://judge0:2358
      WORKERS: 1
    depends_on:
      - judge0-db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2358/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
