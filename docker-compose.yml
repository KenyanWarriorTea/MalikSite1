version: '3.8'

services:
  web:
    build:
      context: ./backend
    ports:
      - '8000:8000'
    environment:
      JUDGE0_URL: http://judge0:2358
    volumes:
      - ./backend:/app
    networks:
      - app-network
    depends_on:
      - db
      - judge0

  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: tasks_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network

  judge0:
    image: judge0/judge0
    ports:
      - '2358:2358'
    networks:
      - app-network

  judge0-db:
    image: redis:latest
    networks:
      - app-network

networks:
  app-network:

volumes:
  db_data:
