x-logging:
  &default-logging
  logging:
    driver: json-file
    options:
      max-size: 100M

services:
  web:
    build:
      context: ./backend
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://user:password@app-db:5432/tasks_db
      JUDGE0_URL: http://server:2358
    volumes:
      - ./backend:/app
    networks:
      - app-network
    depends_on:
      app-db:
        condition: service_healthy
      server:
        condition: service_started
      worker:
        condition: service_started
    restart: unless-stopped

  app-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tasks_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d tasks_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  server:
    image: judge0/judge0:latest
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - '2358:2358'
    privileged: true
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    <<: *default-logging
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "ruby -rnet/http -ruri -e \"res=Net::HTTP.get_response(URI('http://localhost:2358/system_info')); exit(res.code.to_i < 500 ? 0 : 1)\""]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

  worker:
    image: judge0/judge0:latest
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    <<: *default-logging
    restart: always

  db:
    image: postgres:16.2
    env_file: judge0.conf
    volumes:
      - judge0_data:/var/lib/postgresql/data/
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0 -d judge0"]
      interval: 10s
      timeout: 5s
      retries: 10
    <<: *default-logging
    restart: always

  redis:
    image: redis:7.2.4
    command: [
      "bash", "-c",
      'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"'
    ]
    env_file: judge0.conf
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    <<: *default-logging
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
  judge0_data:
