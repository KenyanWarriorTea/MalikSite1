# Judge0 configuration for local Docker Compose

POSTGRES_HOST=db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0-postgres-password-change-me

REDIS_HOST=redis
REDIS_PORT=6379
REDIS_PASSWORD=judge0-redis-password-change-me

RAILS_ENV=production
JUDGE0_TELEMETRY_ENABLE=false

# Enable common languages and keep the local setup lightweight.
ENABLE_WAIT_RESULT=true
ENABLE_COMPILER_OPTIONS=true
ENABLE_COMMAND_LINE_ARGUMENTS=true
MAX_CPU_TIME_LIMIT=15
MAX_MEMORY_LIMIT=512000
MAX_WALL_TIME_LIMIT=30
